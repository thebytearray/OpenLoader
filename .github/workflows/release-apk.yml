name: Publish APK to GitHub Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag for this release (example v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as GitHub pre-release (unchecked = stable release)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify signing secrets
        env:
          KEYSTORE_B64: ${{ secrets.OPENLOADER_RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.OPENLOADER_RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.OPENLOADER_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.OPENLOADER_RELEASE_KEY_PASSWORD }}
        run: |
          missing=
          [ -z "$KEYSTORE_B64" ] && missing="${missing} OPENLOADER_RELEASE_KEYSTORE_BASE64"
          [ -z "$STORE_PASSWORD" ] && missing="${missing} OPENLOADER_RELEASE_STORE_PASSWORD"
          [ -z "$KEY_ALIAS" ] && missing="${missing} OPENLOADER_RELEASE_KEY_ALIAS"
          [ -z "$KEY_PASSWORD" ] && missing="${missing} OPENLOADER_RELEASE_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Configure these repository secrets (Settings → Secrets and variables → Actions):$missing"
            echo "OPENLOADER_RELEASE_KEYSTORE_BASE64 must be the keystore file encoded with: base64 -i your.keystore | pbcopy (or base64 -w0 on Linux)."
            exit 1
          fi

      - name: Prepare release keystore
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.OPENLOADER_RELEASE_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="${RUNNER_TEMP}/openloader-release.keystore"
          echo "$KEYSTORE_B64" | base64 -d > "$KEYSTORE_PATH"
          echo "path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        env:
          OPENLOADER_RELEASE_STORE_FILE: ${{ steps.keystore.outputs.path }}
          OPENLOADER_RELEASE_STORE_PASSWORD: ${{ secrets.OPENLOADER_RELEASE_STORE_PASSWORD }}
          OPENLOADER_RELEASE_KEY_ALIAS: ${{ secrets.OPENLOADER_RELEASE_KEY_ALIAS }}
          OPENLOADER_RELEASE_KEY_PASSWORD: ${{ secrets.OPENLOADER_RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
