syntax = "proto3";

package org.thebytearray.app.android.openloader.data;

option java_multiple_files = true;
option java_package = "org.thebytearray.app.android.openloader.data";

message InstallHistory {
  repeated InstallRecord entries = 1;
}

message InstallRecord {
  string package_name = 1;
  string app_label = 2;
  int64 installed_at_epoch_ms = 3;
  bool success = 4;
  string result_message = 5;
}
